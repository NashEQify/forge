name: save
description: "Session persistence — one command for mid-session and end-of-session (no separate quicksave). The context window is the primary source. Footprint self-adapts: handoff merge always safe, history on task-closeout, buffer cleanup skips when empty."
need_phrase: "persist a session"
trigger: ["save"]
derived_from: "WORKFLOW.md@2026-06-02"

steps:
  # ==========================================================================
  # Group A: pre-write (sequential)
  # ==========================================================================

  - id: dispatcher-final
    name: "Dispatcher final run (inline)"
    category: deterministic
    instruction: >
      Buddy inline: triage PENDING entries from docs/session-buffer.md
      (act / defer / drop). Skip when the buffer is empty. The dispatcher
      skill is retired — the mechanic now runs inline.


      `[framework-feedback]` routing (safety-net actuator): a
      `[framework-feedback]`-tagged PENDING entry is framework-friction
      that belongs in forge_dev's forge-feed, NOT the consumer buffer.
      Write-direct on notice stays PRIMARY
      (`$FRAMEWORK_DIR/docs/dogfood-learnings/README.md` §39-40) — this
      step is only the backstop for what slipped into the buffer. Per
      such entry: (1) run the 6-check pre-write filter (README §Pre-write
      filter) — 2+ checks fire skip ⇒ mark the buffer entry
      `status: PROCESSED` with a one-line drop-note, do NOT route;
      (2) passes ⇒ allocate the next `L-NNN` (= max `L-NNN` across BOTH
      `forge-feed.md` + `implemented-forge-feeds.md`, +1), append the
      entry to `$FRAMEWORK_DIR/docs/dogfood-learnings/forge-feed.md` in
      the README entry format, then mark the buffer entry
      `status: PROCESSED` (the `buffer-cleanup` step removes it). The
      destination is ALWAYS `$FRAMEWORK_DIR` (injected every session) —
      the buffer is consumer-local (CWD), the forge-feed is cross-repo.
    completion:
      type: manual
    required: false
    on_fail: skip

  - id: validate-reconciliation
    name: "Validate + reconciliation"
    category: content
    instruction: >
      Three checks against the context window (no reads):
      (1) Gap check: is there information in the context window that is
          not on disk? → write it immediately.
      (2) Task-status reconciliation: every status change made this session
          MUST be reflected in the task YAMLs.
      (3) Task-graph integrity: `plan_engine --validate` must PASS — a
          sanity gate only. Substantive critical-path placement +
          blocked_by reconciliation live in task_creation /
          task_status_update at mutation time, not here.
    completion:
      type: manual
    on_fail: block

  - id: workflow-handoff-context
    name: "Workflow-engine handoff context"
    category: deterministic
    instruction: >
      When active workflows exist:
      `python3 $FRAMEWORK_DIR/scripts/workflow_engine.py --handoff-context`.
      The output is embedded into the handoff-write step. No active
      workflow → skip.
    completion:
      type: manual
    required: false
    on_fail: skip

  # ==========================================================================
  # Group B: content writes (PARALLEL — one tool-call batch)
  # ==========================================================================

  - id: handoff-write
    name: "Write the session handoff (merge-default)"
    category: content
    group: parallel-writes
    instruction: >
      The primary artefact for session continuity.

      Path (CWD-based; see boot.md §Context routing):
        CWD under <consumer>/workspaces/<name>/ → <consumer>/context/session-handoff-<name>.md
        CWD under <consumer>/ root              → <consumer>/context/session-handoff.md
        CWD external with context/              → <CWD>/context/session-handoff.md
        CWD external without context/           → <CWD>/context/session-handoff.md (auto-create)

      Structure: (1) meta-summary 3-5 sentences, (2) open topics each as a
      9-point block (Intent, Key Concepts, Files, Decisions, Errors,
      User Statements, Open Points, State, Next Step), (3) one-line
      deploy status when relevant. Embed the workflow-state output from
      the previous step. Closed topics go in the meta-summary only, not
      as a 9-point block.

      MERGE-DEFAULT (NOT overwrite):
      (1) `.bak` copy before write: cp <handoff-path> <handoff-path>.bak.
      (2) Read the existing handoff in full.
      (3) Per 9-point block:
          - Closed in this session (task done/closed, user "fertig", PR
            merged) → drop the block, add a one-liner to meta-summary.
          - Open, not touched → block unchanged.
          - Open, worked on → update the block (refresh State / Next Step,
            append new decisions / files / quotes).
          - When in doubt: keep the block. Overkeep beats overkill.
      (4) New open topics from this session: append as new 9-point blocks.
      (5) Meta-summary rewrite from the old + new sessions.
      (6) Write (the file is newly written but the content is the merged
          result).

      Parallel sessions: if the file changed between read and write,
      re-read, do a second merge, then write.

      Defer-durability re-list: carry OPEN `revisit-when:` defer-premises
      (per `_protocols/mca-brief-template.md` §5) forward as handoff
      open-points and re-list them at each save, so an aged "no named
      consumer" premise resurfaces deterministically instead of waiting
      for a reviewer to re-look. A premise closes when a consumer appears
      (promote to a real task) or is re-confirmed absent.
    completion:
      type: file_content_check
      path: "context/session-handoff.md"
      condition: has_match
      pattern: "(?i)session.handoff|## "
    commit_gate: false
    on_fail: block

  - id: history-entry
    name: "History entry"
    category: content
    group: parallel-writes
    instruction: >
      Write the history entry (on task-closeout): context/history/YYYY-MM-DD-<slug>.md.
      Fires when a task closed out this session (Persist Gate); a
      mid-session save with no closeout skips it. Guard: the active
      context path must support history; otherwise skip. Workspace
      sessions: history always lives under <consumer>/context/history/
      (global); the filename includes the workspace name.
    completion:
      type: file_created_matching
      pattern: "context/history/*"
    commit_gate: false
    required: false
    on_fail: skip

  # ==========================================================================
  # Group C: post-write (sequential)
  # ==========================================================================

  - id: commit-push
    name: "Commit + push"
    category: deterministic
    instruction: >
      git add the relevant files + git commit + git push, per CLAUDE.md
      commit convention. If push fails on an SSH passphrase prompt, ask
      the user to push manually.
    completion:
      type: exit_code
      command: "git log -1 --oneline"
    commit_gate: false
    on_fail: escalate

  - id: buffer-cleanup
    name: "Session-buffer cleanup"
    category: deterministic
    instruction: >
      Remove entries with `status: PROCESSED` from docs/session-buffer.md.
      Keep the header. Empty buffer → skip.
    completion:
      type: manual
    required: false
    on_fail: skip

