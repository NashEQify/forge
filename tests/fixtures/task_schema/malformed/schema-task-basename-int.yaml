# F-CA-008 (crash class): `filename.task_basename` corrupted to an int
# (one merge slip / lost quotes on the LOCKED schema). Pre-fix:
# re.compile(123) raises an UNCAUGHT TypeError -> the whole
# --validate / --boot consumer aborts with a traceback, NO SCHEMA_FILE
# ERROR, NO ESCALATE. Expected post-fix: the trust boundary walks
# _TASK_SCHEMA_SHAPE, finds filename.task_basename is not a str ->
# SCHEMA_FILE ERROR + ESCALATE, no crash.
filename:
  task_basename: 123
  id_matches_basename: true
required_always: [id, title, status, created, updated, milestone, blocked_by]
required_when_open: [effort, priority]
required_when_terminal: [id, status]
terminal_status: [done, superseded, wontfix, absorbed]
fields:
  id: {type: int}
  title: {type: str}
  status:
    type: enum
    values: [pending, in_progress, done, superseded, wontfix, absorbed]
  created: {type: date}
  updated: {type: date}
  milestone: {type: str}
  blocked_by: {type: list_int}
  effort:
    type: enum
    values: [S, M, L, XL]
  priority:
    type: enum
    values: [high, medium, low]
validator:
  calibration: warn_first
  strict_after_backfill: false
  out_of_vocab: warn_until_strict
  scope: all_repos
