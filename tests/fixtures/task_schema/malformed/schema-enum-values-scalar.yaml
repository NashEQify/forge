# F-CA-008 (silent-vocab-loss class): `fields.effort.values` corrupted
# to a scalar string (one pair of quotes on the LOCKED schema). Pre-fix:
# _schema_enum_values does isinstance(vals, list) -> returns None ->
# the effort field is silently treated as non-enum -> its vocabulary is
# NO LONGER enforced; a genuinely bad `effort: S-M` in a consumer task
# is no longer flagged, NO crash, NO SCHEMA_FILE ERROR, NO ESCALATE.
# Expected post-fix: the trust boundary walks _TASK_SCHEMA_SHAPE; the
# fields.effort node has type==enum so `values` MUST be a list ->
# SCHEMA_FILE ERROR + ESCALATE, never silent vocab loss.
filename:
  task_basename: '^[0-9]+$'
  id_matches_basename: true
required_always: [id, title, status, created, updated, milestone, blocked_by]
required_when_open: [effort, priority]
required_when_terminal: [id, status]
terminal_status: [done, superseded, wontfix, absorbed]
fields:
  id: {type: int}
  title: {type: str}
  status:
    type: enum
    values: [pending, in_progress, done, superseded, wontfix, absorbed]
  created: {type: date}
  updated: {type: date}
  milestone: {type: str}
  blocked_by: {type: list_int}
  effort:
    type: enum
    values: "S"
  priority:
    type: enum
    values: [high, medium, low]
validator:
  calibration: warn_first
  strict_after_backfill: false
  out_of_vocab: warn_until_strict
  scope: all_repos
