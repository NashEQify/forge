# Descriptor node `fields.<name>.type` corrupted to an int (merge slip
# on the LOCKED schema). Pre-fix: field_def.get("type") == "enum"
# compares an int to a str -> False -> the field is silently treated
# as non-enum -> vocab no longer enforced, NO ERROR, NO ESCALATE.
# Expected post-fix: trust boundary -> SCHEMA_FILE ERROR + ESCALATE
# (fields.effort.type present and not a string).
filename:
  task_basename: '^[0-9]+$'
  id_matches_basename: true
required_always: [id, title, status, created, updated, milestone, blocked_by]
required_when_open: [effort, priority]
required_when_terminal: [id, status]
terminal_status: [done, superseded, wontfix, absorbed]
fields:
  id: {type: int}
  title: {type: str}
  status:
    type: enum
    values: [pending, in_progress, done, superseded, wontfix, absorbed]
  created: {type: date}
  updated: {type: date}
  milestone: {type: str}
  blocked_by: {type: list_int}
  effort:
    type: 123
    values: [S, M, L, XL]
  priority:
    type: enum
    values: [high, medium, low]
validator:
  calibration: warn_first
  strict_after_backfill: false
  out_of_vocab: warn_until_strict
  scope: all_repos
