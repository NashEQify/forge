# Descriptor node `fields.<name>` (a single field-def) corrupted to a
# scalar string (one quoting slip on the LOCKED schema). Pre-fix:
# _schema_enum_values does isinstance(field_def, dict) -> a non-dict
# field-def silently degrades that field's vocab read to skip, NO
# ERROR, NO ESCALATE. Expected post-fix: trust boundary walks
# fields.each_value -> SCHEMA_FILE ERROR + ESCALATE (fields.effort
# present and not a mapping).
filename:
  task_basename: '^[0-9]+$'
  id_matches_basename: true
required_always: [id, title, status, created, updated, milestone, blocked_by]
required_when_open: [effort, priority]
required_when_terminal: [id, status]
terminal_status: [done, superseded, wontfix, absorbed]
fields:
  id: {type: int}
  title: {type: str}
  status:
    type: enum
    values: [pending, in_progress, done, superseded, wontfix, absorbed]
  created: {type: date}
  updated: {type: date}
  milestone: {type: str}
  blocked_by: {type: list_int}
  effort: "enum S M L XL"
  priority:
    type: enum
    values: [high, medium, low]
validator:
  calibration: warn_first
  strict_after_backfill: false
  out_of_vocab: warn_until_strict
  scope: all_repos
