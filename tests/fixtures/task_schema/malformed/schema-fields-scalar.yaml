# Descriptor node `fields` corrupted to a scalar string (one quoting
# slip on the LOCKED schema). Pre-fix: _schema_field_defs returns {}
# on a non-dict -> every vocab/known-field check silently degrades to
# skip, NO ERROR, NO ESCALATE. Expected post-fix: trust boundary ->
# SCHEMA_FILE ERROR + ESCALATE (fields present and not a mapping).
filename:
  task_basename: '^[0-9]+$'
  id_matches_basename: true
required_always: [id, title, status, created, updated, milestone, blocked_by]
required_when_open: [effort, priority]
required_when_terminal: [id, status]
terminal_status: [done, superseded, wontfix, absorbed]
fields: "id title status"
validator:
  calibration: warn_first
  strict_after_backfill: false
  out_of_vocab: warn_until_strict
  scope: all_repos
