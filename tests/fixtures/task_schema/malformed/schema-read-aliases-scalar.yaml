# Descriptor node `fields.<name>.read_aliases` corrupted to a scalar
# string (one quoting slip on the LOCKED schema). read_aliases is the
# single place tolerant priority READ-classification is defined; a
# non-dict here silently loses every alias mapping with NO diagnostic
# the moment a downstream reader consumes it. Expected post-fix: trust
# boundary -> SCHEMA_FILE ERROR + ESCALATE (priority.read_aliases
# present and not a mapping).
filename:
  task_basename: '^[0-9]+$'
  id_matches_basename: true
required_always: [id, title, status, created, updated, milestone, blocked_by]
required_when_open: [effort, priority]
required_when_terminal: [id, status]
terminal_status: [done, superseded, wontfix, absorbed]
fields:
  id: {type: int}
  title: {type: str}
  status:
    type: enum
    values: [pending, in_progress, done, superseded, wontfix, absorbed]
  created: {type: date}
  updated: {type: date}
  milestone: {type: str}
  blocked_by: {type: list_int}
  effort:
    type: enum
    values: [S, M, L, XL]
  priority:
    type: enum
    values: [high, medium, low]
    read_aliases: "mid medium"
validator:
  calibration: warn_first
  strict_after_backfill: false
  out_of_vocab: warn_until_strict
  scope: all_repos
