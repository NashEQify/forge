# Descriptor list-element rule: `required_always` is a list but one
# element is an int (a partial corruption — a sub-list quoting slip on
# the LOCKED schema). Pre-fix: `id` 123 enters the required-field-name
# set; `data.get(123)` is always None -> a phantom required field 123
# is enforced on every task, silently, NO ESCALATE. Expected post-fix:
# the walker checks elem_type=str -> SCHEMA_FILE ERROR + ESCALATE
# (required_always[7] must be a string, got int).
filename:
  task_basename: '^[0-9]+$'
  id_matches_basename: true
required_always: [id, title, status, created, updated, milestone, blocked_by, 123]
required_when_open: [effort, priority]
required_when_terminal: [id, status]
terminal_status: [done, superseded, wontfix, absorbed]
fields:
  id: {type: int}
  title: {type: str}
  status:
    type: enum
    values: [pending, in_progress, done, superseded, wontfix, absorbed]
  created: {type: date}
  updated: {type: date}
  milestone: {type: str}
  blocked_by: {type: list_int}
  effort:
    type: enum
    values: [S, M, L, XL]
  priority:
    type: enum
    values: [high, medium, low]
validator:
  calibration: warn_first
  strict_after_backfill: false
  out_of_vocab: warn_until_strict
  scope: all_repos
