# Descriptor node `required_when_open` corrupted to a scalar string
# (one quoting slip on the LOCKED schema). Pre-fix:
# list("effort") -> char-split -> the real open-required set is
# silently replaced with single-character field names, NO ERROR, NO
# ESCALATE. Expected post-fix: trust boundary -> SCHEMA_FILE ERROR +
# ESCALATE (required_when_open present and not a list).
filename:
  task_basename: '^[0-9]+$'
  id_matches_basename: true
required_always: [id, title, status, created, updated, milestone, blocked_by]
required_when_open: "effort"
required_when_terminal: [id, status]
terminal_status: [done, superseded, wontfix, absorbed]
fields:
  id: {type: int}
  title: {type: str}
  status:
    type: enum
    values: [pending, in_progress, done, superseded, wontfix, absorbed]
  created: {type: date}
  updated: {type: date}
  milestone: {type: str}
  blocked_by: {type: list_int}
  effort:
    type: enum
    values: [S, M, L, XL]
  priority:
    type: enum
    values: [high, medium, low]
validator:
  calibration: warn_first
  strict_after_backfill: false
  out_of_vocab: warn_until_strict
  scope: all_repos
